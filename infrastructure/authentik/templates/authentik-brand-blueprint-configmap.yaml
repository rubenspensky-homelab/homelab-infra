apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-brand-blueprints
data:
  homelab-brand.yaml: |
    version: 1
    metadata:
      name: Homelab Brand
    entries:
      - model: authentik_brands.brand
        state: present
        identifiers:
          domain: auth.home.lab
        attrs:
          default: false
          branding_title: Homelab Lab Auth
          branding_custom_css: |
            :root {
              --pf-global--primary-color--100: #0f766e;
              --pf-global--primary-color--200: #115e59;
              --pf-global--link--Color: #14b8a6;
            }

            .pf-c-button.pf-m-primary,
            button[type="submit"] {
              background: linear-gradient(135deg, #0f766e, #14b8a6) !important;
              border: none !important;
            }

            .pf-c-login__main {
              border-radius: 18px;
              box-shadow: 0 20px 60px rgba(15, 118, 110, 0.35);
            }

      - model: authentik_brands.brand
        state: present
        identifiers:
          domain: auth.rubenspensky.com
        attrs:
          default: true
          branding_title: Rubenspensky Auth
          branding_custom_css: |
            /* ==========================================================
            Rubenspensky Home Lab
            Authentik Login Theme
            ========================================================== */

          :root {
            /* PatternFly / Authentik colors */

            --pf-global--primary-color--100: #1687ff;
            --pf-global--primary-color--200: #0f6ad8;
            --pf-global--primary-color--300: #0852b8;

            --pf-global--link--Color: #45b6ff;
            --pf-global--link--Color--hover: #8bd7ff;

            /* Brand colors */

            --rubenspensky-blue: #1687ff;
            --rubenspensky-blue-light: #4fc3ff;
            --rubenspensky-orange: #ff5a24;

            /* Surfaces */

            --rubenspensky-card-top: rgba(25, 37, 54, 0.97);
            --rubenspensky-card-bottom: rgba(13, 22, 35, 0.97);
            --rubenspensky-input: rgba(5, 14, 27, 0.9);

            /* Text */

            --rubenspensky-text: #f1f7ff;
            --rubenspensky-text-secondary: #c2d0df;
            --rubenspensky-text-muted: #8295aa;

            /* Borders */

            --rubenspensky-border: rgba(70, 155, 255, 0.22);
            --rubenspensky-input-border: rgba(92, 140, 195, 0.3);
          }

          /* ==========================================================
            Page
            Do not use "background" here because it removes the image.
            ========================================================== */

          html,
          body {
            min-height: 100%;
            color: var(--rubenspensky-text);
          }

          /* Keep the Authentik background image visible */
          body {
            background-color: #020817 !important;
          }

          /* ==========================================================
            Main login card
            ========================================================== */

          .pf-c-login__main,
          .pf-v5-c-login__main {
            position: relative;

            width: min(100%, 530px) !important;

            background:
              linear-gradient(
                180deg,
                var(--rubenspensky-card-top) 0%,
                var(--rubenspensky-card-bottom) 100%
              ) !important;

            border: 1px solid var(--rubenspensky-border) !important;
            border-radius: 20px !important;

            box-shadow:
              0 24px 70px rgba(0, 0, 0, 0.62),
              0 0 20px rgba(22, 135, 255, 0.08) !important;

            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);

            overflow: hidden;
          }

          /* Blue line at the top of the card */
          .pf-c-login__main::before,
          .pf-v5-c-login__main::before {
            content: "";

            position: absolute;
            top: 0;
            left: 0;
            right: 0;

            height: 2px;

            background:
              linear-gradient(
                90deg,
                transparent 0%,
                #1687ff 35%,
                #55c8ff 50%,
                #1687ff 65%,
                transparent 100%
              );

            box-shadow: 0 0 12px rgba(22, 135, 255, 0.45);

            pointer-events: none;
          }

          /* ==========================================================
            Card spacing
            ========================================================== */

          .pf-c-login__main-body,
          .pf-v5-c-login__main-body {
            padding-top: 1.25rem !important;
            padding-bottom: 1.25rem !important;
          }

          /* Reduce excessive vertical space */
          .pf-c-form,
          .pf-v5-c-form {
            gap: 1rem !important;
          }

          .pf-c-form__group,
          .pf-v5-c-form__group {
            margin-bottom: 1rem !important;
          }

          /* ==========================================================
            Logo
            ========================================================== */

          .pf-c-login__main-header,
          .pf-v5-c-login__main-header {
            padding-bottom: 0.75rem !important;
          }

          .pf-c-login__main-header img,
          .pf-v5-c-login__main-header img {
            width: auto !important;
            max-width: 280px !important;
            max-height: 180px !important;

            object-fit: contain;

            filter:
              drop-shadow(0 8px 20px rgba(0, 0, 0, 0.3))
              drop-shadow(0 0 14px rgba(22, 135, 255, 0.14));
          }

          /* ==========================================================
            Titles and text
            ========================================================== */

          .pf-c-title,
          .pf-v5-c-title,
          .pf-c-login__main-header,
          .pf-v5-c-login__main-header,
          h1,
          h2,
          h3 {
            color: var(--rubenspensky-text) !important;
          }

          .pf-c-title,
          .pf-v5-c-title,
          h1 {
            font-weight: 500 !important;
            letter-spacing: -0.02em;
          }

          p,
          label,
          .pf-c-form__label-text,
          .pf-v5-c-form__label-text {
            color: var(--rubenspensky-text-secondary) !important;
          }

          .pf-c-form__label-text,
          .pf-v5-c-form__label-text {
            font-weight: 600 !important;
          }

          /* Placeholder text */
          input::placeholder,
          textarea::placeholder {
            color: #7f8c9d !important;
            opacity: 1;
          }

          /* Secondary and helper text */
          .pf-c-helper-text,
          .pf-v5-c-helper-text,
          .pf-c-form__helper-text,
          .pf-v5-c-form__helper-text {
            color: var(--rubenspensky-text-muted) !important;
          }

          /* ==========================================================
            Inputs
            ========================================================== */

          .pf-c-form-control,
          .pf-v5-c-form-control,
          input,
          select,
          textarea {
            min-height: 42px;

            background: var(--rubenspensky-input) !important;
            color: var(--rubenspensky-text) !important;

            border: 1px solid var(--rubenspensky-input-border) !important;
            border-radius: 8px !important;

            box-shadow:
              inset 0 1px 2px rgba(0, 0, 0, 0.28) !important;

            transition:
              border-color 160ms ease,
              box-shadow 160ms ease,
              background-color 160ms ease !important;
          }

          .pf-c-form-control:hover,
          .pf-v5-c-form-control:hover,
          input:hover,
          select:hover,
          textarea:hover {
            border-color: rgba(77, 175, 255, 0.48) !important;
          }

          .pf-c-form-control:focus,
          .pf-v5-c-form-control:focus,
          input:focus,
          select:focus,
          textarea:focus {
            background: rgba(6, 17, 32, 0.98) !important;

            border-color: var(--rubenspensky-blue) !important;

            box-shadow:
              0 0 0 1px var(--rubenspensky-blue),
              0 0 0 4px rgba(22, 135, 255, 0.1),
              0 0 16px rgba(22, 135, 255, 0.16) !important;

            outline: none !important;
          }

          /* ==========================================================
            Primary buttons
            ========================================================== */

          .pf-c-button.pf-m-primary,
          .pf-v5-c-button.pf-m-primary,
          button[type="submit"] {
            min-height: 42px;

            background:
              linear-gradient(
                180deg,
                #2e9cff 0%,
                #1687ff 52%,
                #0d6fd8 100%
              ) !important;

            border: 1px solid rgba(118, 205, 255, 0.42) !important;
            border-radius: 8px !important;

            color: #ffffff !important;
            font-weight: 650 !important;

            box-shadow:
              0 8px 22px rgba(0, 103, 219, 0.28),
              inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;

            transition:
              transform 150ms ease,
              filter 150ms ease,
              box-shadow 150ms ease !important;
          }

          .pf-c-button.pf-m-primary:hover,
          .pf-v5-c-button.pf-m-primary:hover,
          button[type="submit"]:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);

            box-shadow:
              0 11px 28px rgba(0, 126, 255, 0.34),
              0 0 18px rgba(22, 135, 255, 0.15),
              inset 0 1px 0 rgba(255, 255, 255, 0.22) !important;
          }

          .pf-c-button.pf-m-primary:active,
          .pf-v5-c-button.pf-m-primary:active,
          button[type="submit"]:active {
            transform: translateY(0);
            filter: brightness(0.97);
          }

          .pf-c-button.pf-m-primary:focus,
          .pf-v5-c-button.pf-m-primary:focus,
          button[type="submit"]:focus {
            box-shadow:
              0 0 0 3px rgba(22, 135, 255, 0.24),
              0 8px 22px rgba(0, 103, 219, 0.28) !important;
          }

          /* ==========================================================
            Secondary buttons
            ========================================================== */

          .pf-c-button.pf-m-secondary,
          .pf-v5-c-button.pf-m-secondary {
            background: rgba(7, 18, 33, 0.72) !important;

            color: var(--rubenspensky-blue-light) !important;

            border: 1px solid rgba(77, 175, 255, 0.35) !important;
            border-radius: 8px !important;
          }

          .pf-c-button.pf-m-secondary:hover,
          .pf-v5-c-button.pf-m-secondary:hover {
            background: rgba(22, 135, 255, 0.1) !important;
            border-color: rgba(77, 175, 255, 0.6) !important;
          }

          /* ==========================================================
            Links
            ========================================================== */

          a {
            color: var(--pf-global--link--Color) !important;
            text-decoration: none !important;

            transition:
              color 150ms ease,
              text-shadow 150ms ease !important;
          }

          a:hover {
            color: var(--pf-global--link--Color--hover) !important;
            text-shadow: 0 0 10px rgba(79, 195, 255, 0.25);
          }

          /* ==========================================================
            Alerts and errors
            ========================================================== */

          .pf-c-alert.pf-m-danger,
          .pf-v5-c-alert.pf-m-danger,
          .pf-c-helper-text.pf-m-error,
          .pf-v5-c-helper-text.pf-m-error {
            --pf-c-alert--m-danger--BorderTopColor: var(--rubenspensky-orange);

            background: rgba(255, 90, 36, 0.08) !important;

            border: 1px solid rgba(255, 90, 36, 0.32) !important;
            border-radius: 8px !important;

            color: #ffc0ab !important;
          }

          /* Success alerts */
          .pf-c-alert.pf-m-success,
          .pf-v5-c-alert.pf-m-success {
            background: rgba(32, 190, 125, 0.08) !important;

            border: 1px solid rgba(32, 190, 125, 0.32) !important;
            border-radius: 8px !important;

            color: #a4f3cf !important;
          }

          /* ==========================================================
            Avatar
            ========================================================== */

          .pf-c-avatar,
          .pf-v5-c-avatar {
            border: 2px solid rgba(22, 135, 255, 0.45);

            box-shadow:
              0 0 12px rgba(22, 135, 255, 0.15);
          }

          /* ==========================================================
            Language selector
            ========================================================== */

          .pf-c-select__toggle,
          .pf-v5-c-menu-toggle {
            background: rgba(8, 19, 35, 0.36) !important;

            border: 1px solid rgba(80, 140, 205, 0.2) !important;
            border-radius: 8px !important;

            color: var(--rubenspensky-text-secondary) !important;
          }

          /* ==========================================================
            Hide Powered by authentik
            ========================================================== */

          .pf-c-login__footer,
          .pf-v5-c-login__footer {
            display: none !important;
          }

          /* Fallback for other footer structures */
          footer a[href*="goauthentik"],
          a[href*="goauthentik.io"] {
            display: none !important;
          }

          /* ==========================================================
            Scrollbar
            ========================================================== */

          ::-webkit-scrollbar {
            width: 9px;
          }

          ::-webkit-scrollbar-track {
            background: #06101d;
          }

          ::-webkit-scrollbar-thumb {
            background: #1a4f83;
            border-radius: 20px;
          }

          ::-webkit-scrollbar-thumb:hover {
            background: #1687ff;
          }

          /* ==========================================================
            Mobile
            ========================================================== */

          @media (max-width: 768px) {
            .pf-c-login__main,
            .pf-v5-c-login__main {
              width: calc(100% - 24px) !important;

              margin: 12px !important;

              border-radius: 15px !important;
            }

            .pf-c-login__main-header img,
            .pf-v5-c-login__main-header img {
              max-width: 230px !important;
              max-height: 145px !important;
            }

            .pf-c-login__main-body,
            .pf-v5-c-login__main-body {
              padding-left: 1.1rem !important;
              padding-right: 1.1rem !important;
            }
          }

          /* ==========================================================
            Reduced motion
            ========================================================== */

          @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
              scroll-behavior: auto !important;
              transition: none !important;
              animation: none !important;
            }
          }
