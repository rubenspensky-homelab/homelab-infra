apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-user-registration-blueprints
data:
  user-registration-flow.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Homelab - User Registration Flow
      labels:
        blueprints.goauthentik.io/description: Public self-registration enrollment flow for homelab users.

    entries:
      # Create or update the enrollment flow itself.
      # `state: present` makes this idempotent: re-applying the blueprint updates
      # the declared fields without creating duplicate flows.
      - model: authentik_flows.flow
        state: present
        id: user-registration-flow
        identifiers:
          slug: user-registration
        attrs:
          name: user-registration
          title: Create your account
          designation: enrollment
          authentication: require_unauthenticated

      # Prompt field: email address.
      - model: authentik_stages_prompt.prompt
        state: present
        id: user-registration-prompt-email
        identifiers:
          name: user-registration-field-email
        attrs:
          field_key: email
          label: Email
          type: email
          required: true
          placeholder: Email
          placeholder_expression: false
          order: 0

      # Prompt field: username.
      - model: authentik_stages_prompt.prompt
        state: present
        id: user-registration-prompt-username
        identifiers:
          name: user-registration-field-username
        attrs:
          field_key: username
          label: Username
          type: username
          required: true
          placeholder: Username
          placeholder_expression: false
          order: 1

      # Prompt field: password.
      - model: authentik_stages_prompt.prompt
        state: present
        id: user-registration-prompt-password
        identifiers:
          name: user-registration-field-password
        attrs:
          field_key: password
          label: Password
          type: password
          required: true
          placeholder: Password
          placeholder_expression: false
          order: 2

      # Prompt stage that renders all registration inputs in a single screen.
      - model: authentik_stages_prompt.promptstage
        state: present
        id: user-registration-prompt-stage
        identifiers:
          name: user-registration-prompt-stage
        attrs:
          fields:
            - !KeyOf user-registration-prompt-email
            - !KeyOf user-registration-prompt-username
            - !KeyOf user-registration-prompt-password

      # User Write stage that creates the user from prompt data.
      # `always_create` is the standard self-registration behavior.
      - model: authentik_stages_user_write.userwritestage
        state: present
        id: user-registration-user-write-stage
        identifiers:
          name: user-registration-user-write-stage
        attrs:
          user_creation_mode: always_create

      # User Login stage that signs the user in immediately after successful registration.
      - model: authentik_stages_user_login.userloginstage
        state: present
        id: user-registration-user-login-stage
        identifiers:
          name: user-registration-user-login-stage

      # Bind the prompt stage to the flow first so the user can submit registration data.
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !KeyOf user-registration-flow
          stage: !KeyOf user-registration-prompt-stage
          order: 10
        attrs:
          re_evaluate_policies: true

      # Bind the User Write stage second so Authentik creates the new user account.
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !KeyOf user-registration-flow
          stage: !KeyOf user-registration-user-write-stage
          order: 20

      # Bind the User Login stage last so the new user gets an authenticated session.
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !KeyOf user-registration-flow
          stage: !KeyOf user-registration-user-login-stage
          order: 30
