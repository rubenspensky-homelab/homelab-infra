# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Homelab - Demo Apps v1
  labels:
    blueprints.goauthentik.io/description: OIDC applications for demo users.

entries:
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: frontend-demo-oidc-provider
    identifiers:
      name: frontend-demo-oidc-provider
    attrs:
      name: frontend-demo-oidc-provider
      authentication_flow: !Find
        - authentik_flows.flow
        - [slug, demo-authentication]
      authorization_flow: !Find
        - authentik_flows.flow
        - [slug, default-provider-authorization-implicit-consent]
      invalidation_flow: !Find
        - authentik_flows.flow
        - [slug, default-provider-invalidation-flow]
      property_mappings:
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, goauthentik.io/providers/oauth2/scope-openid]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, goauthentik.io/providers/oauth2/scope-email]
        - !Find
          - authentik_providers_oauth2.scopemapping
          - [managed, goauthentik.io/providers/oauth2/scope-profile]
      client_type: public
      grant_types:
        - authorization_code
        - refresh_token
      client_id: frontend-demo
      redirect_uris:
        - matching_mode: strict
          url: https://frontend-demo.rubenspensky.com/auth/callback
          redirect_uri_type: authorization
        - matching_mode: strict
          url: http://localhost:5173/auth/callback
          redirect_uri_type: authorization
      include_claims_in_id_token: true
      sub_mode: user_uuid
      issuer_mode: global

  - model: authentik_core.application
    state: present
    id: frontend-demo-application
    identifiers:
      slug: frontend-demo
    attrs:
      name: Frontend Demo
      slug: frontend-demo
      provider: !KeyOf frontend-demo-oidc-provider
      open_in_new_tab: true
      meta_launch_url: https://frontend-demo.rubenspensky.com
      meta_description: Frontend demo application for registered demo users.

  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !KeyOf frontend-demo-application
      group: !Find
        - authentik_core.group
        - [name, demo-users]
      order: 10
    attrs:
      enabled: true
      failure_result: false
