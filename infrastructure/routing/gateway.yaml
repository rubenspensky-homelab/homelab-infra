apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: routing
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      hostname: "*.home.lab"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All

    - name: http-public
      protocol: HTTP
      port: 80
      hostname: "*.rubenspensky.com"
      allowedRoutes:
        namespaces:
          from: All
