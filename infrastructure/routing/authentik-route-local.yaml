apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-local
  namespace: authentik
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: routing
      sectionName: http
  hostnames:
    - auth.home.lab
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
