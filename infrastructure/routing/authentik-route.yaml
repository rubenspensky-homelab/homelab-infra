apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: routing
  hostnames:
    - auth.home.lab
    - auth.rubenspensky.com
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
