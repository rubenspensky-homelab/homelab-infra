apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# KubeVirt v1.8.4 official release assets:
# https://github.com/kubevirt/kubevirt/releases/tag/v1.8.4
resources:
  - kubevirt-operator.yaml
  - kubevirt-cr.yaml

patches:
  - target:
      group: kubevirt.io
      version: v1
      kind: KubeVirt
      name: kubevirt
      namespace: kubevirt
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "1"
