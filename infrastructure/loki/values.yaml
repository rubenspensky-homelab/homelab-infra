loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    storage:
      type: filesystem

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    limits_config:
      retention_period: 7d

    compactor:
      retention_enabled: true
      delete_request_store: filesystem

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi

  read:
    replicas: 0

  write:
    replicas: 0

  backend:
    replicas: 0

  gateway:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

  test:
    enabled: false

  lokiCanary:
    enabled: false

  sidecar:
    rules:
      enabled: false

  chunksCache:
    enabled: false

  resultsCache:
    enabled: false
