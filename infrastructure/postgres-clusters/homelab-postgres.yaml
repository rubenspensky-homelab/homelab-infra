apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: databases
spec:
  description: Shared PostgreSQL cluster for homelab platform services
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10@sha256:d548fc6aa21639df474d7e866abe0f44a280a67b3c0c005b5c2177ca189bb5c9

  storage:
    size: 20Gi

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
