apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami
  namespace: analytics
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: routing
  hostnames:
    - umami.home.lab
    - umami.rubenspensky.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove:
              - X-Frame-Options
              - Content-Security-Policy
            set:
              - name: Content-Security-Policy
                value: "frame-ancestors 'self' http://localhost:5173 https://frontend-demo.rubenspensky.com;"
      backendRefs:
        - name: umami
          port: 80
