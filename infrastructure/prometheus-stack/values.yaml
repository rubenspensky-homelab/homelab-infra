kube-prometheus-stack:
  fullnameOverride: prometheus-stack

  crds:
    enabled: false

  grafana:
    enabled: true

    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password

    envFromSecret: grafana-database-credentials

    grafana.ini:
      database:
        type: postgres
        host: homelab-postgres-rw.databases.svc.cluster.local:5432
        name: grafana
        user: $__env{GF_DATABASE_USER}
        password: $__env{GF_DATABASE_PASSWORD}
        ssl_mode: disable
      security:
        allow_embedding: true

    service:
      type: ClusterIP

    sidecar:
      dashboards:
        enabled: false
        label: grafana_dashboard
        labelValue: "1"
        folderAnnotation: grafana_folder
        searchNamespace: monitoring

    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.logging.svc.cluster.local
        isDefault: false
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.logging.svc.cluster.local:3200
        isDefault: false

  prometheus:
    prometheusSpec:
      retention: 7d

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

  alertmanager:
    enabled: true

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true
