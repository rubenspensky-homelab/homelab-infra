kube-prometheus-stack:
  fullnameOverride: prometheus-stack

  grafana:
    enabled: true
    adminPassword: admin

    service:
      type: ClusterIP

  prometheus:
    prometheusSpec:
      retention: 7d

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

  alertmanager:
    enabled: true

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true
